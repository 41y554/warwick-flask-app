<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Summer School Information and Application Portal: Homepage</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT"
      crossorigin="anonymous"
    />
  </head>
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2>Applications</h2>
      <a href="{{ url_for('logout') }}" class="btn btn-outline-secondary"
        >Logout</a
      >
    </div>
    <table class="table table-striped">
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Course</th>
          <th>Reason</th>
          <th>Applied at</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        {% for application in applications %}
        <tr>
          <td>{{ application[1] }}</td>  <!-- Name -->
            <td>{{ application[2] }}</td>  <!-- Email -->
            <td>{{ application[3] }}</td>  <!-- Course -->
            <td>{{ application[4] }}</td>  <!-- Reason -->
            <td>{{ application[5] }}</td>  <!-- Timestamp -->
            <td>{{ application[6] }}</td>  <!-- Status -->
          <td>
            <a
              href="{{ url_for('view', app_id=application[0]) }}"
              class="btn btn-sm btn-outline-primary"
              >View</a
            >
            <a
              href="{{ url_for('delete', reg_id=application[0]) }}"
              class="btn btn-sm btn-outline-danger ms-1"
              >Delete</a
            >
            <a href="{{ url_for('accept', reg_id=application[0]) }}" class="btn btn-sm btn-outline-success ms-1">Accept</a>
              <a href="{{ url_for('reject', reg_id=application[0]) }}" class="btn btn-sm btn-outline-warning ms-1">Reject</a>
          </td>

        </tr>
        {% endfor %}
      </tbody>
    </table>

<script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
