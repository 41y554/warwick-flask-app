  <!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Summer School Information and Application Portal: Homepage</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT"
      crossorigin="anonymous"
    />
  </head>
  

  <body>
    {% include 'header.html' %}

    <!--Main body content-->

    <main class="container mt-5">
      <h2>Apply Today</h2>
      <form method="POST">
          <div class="mb-3">
              <label for="name" class="form-label">Name</label>
              <input type="text" class="form-control" id="name" name="name" required placeholder="First Name Last Name">
          </div>
          <div class="mb-3">
              <label for="email" class="form-label">Email address</label>
              <input type="email" class="form-control" id="email" name="email" required placeholder="u1234567@live.warwick.ac.uk">
          </div>

          <div class="mb-3">
          <label for="exampleDataList" class="form-label">Chosen Course</label>
          <input class="form-control" list="datalistOptions" id="exampleDataList" name="course" placeholder="Select from options">
          <datalist id="datalistOptions">
            <option value="Management">
            <option value="Business Analytics">
            <option value="International Business">
            <option value="Machine Learning">
            <option value="Computer Science">
            <option value="Artificial Intelligence"> 
            <option value="Biology">
            <option value="Chemistry">
            <option value="Physics"> 
          </datalist>
        </div>


    
          <div class="mb-3">
  <label for="applicationreason">Reason for application</label>
  <textarea class="form-control" id="applicationreason" name="applicationreason" rows="3" placeholder="Max. 500 words"></textarea>
</div>

<button type="submit" class="btn btn-primary">Submit Application</button>

  
{% include 'footer.html' %}

    <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO"
    crossorigin="anonymous"
  ></script>
  </body>
</html>

<script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
