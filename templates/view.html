<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Summer School Information and Application Portal: Homepage</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT"
      crossorigin="anonymous"
    />
  </head>
  <body class="container mt-5">
    <h2>Application Details</h2>
    <table class="table table-bordered">
      <tbody>
        <tr>
          <th>ID</th>
          <td>{{ application[0] }}</td>
        </tr>
        <tr>
          <th>Name</th>
          <td>{{ application[1] }}</td>
        </tr>
        <tr>
          <th>Email</th>
          <td>{{ application[2] }}</td>
        </tr>
        <tr>
          <th>Course</th>
          <td>{{ application[3] }}</td>
        </tr>
        <tr>
          <th>Reason</th>
          <td>{{ application[4] }}</td>
        </tr>
        <tr>
          <th>Applied At</th>
          <td>{{ application[5] }}</td>
        </tr>
        <tr>
          <th>Status</th>
          <td>{{ application[6] }}</td>
        </tr>
      </tbody>
    </table>

    <a href="{{ url_for('dashboard') }}" class="btn btn-primary">Back to Dashboard</a>

    <div>
      <a href="{{ url_for('accept', reg_id=application[0]) }}" class="btn btn-success me-2">Accept</a>
      <a href="{{ url_for('reject', reg_id=application[0]) }}" class="btn btn-warning">Reject</a>
    </div>
  </div>


 

     

      
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
